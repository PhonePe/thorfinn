  - { method: "<android.os.Bundle: java.lang.Object get(java.lang.String)>", from: base, to: result }
  # Bundle.get() transfer typed as Intent - for Intent Redirection via Bundle.get("key") cast to Intent
  - { method: "<android.os.Bundle: java.lang.Object get(java.lang.String)>", from: base, to: result, type: "android.content.Intent" }
  - { method: "<android.os.BaseBundle: java.lang.String getString(java.lang.String)>", from: base, to: result }
  - { method: "<android.os.BaseBundle: java.lang.String getString(java.lang.String,java.lang.String)>", from: base, to: result }

  # Bundle Parcelable transfers - for nested Intent extraction (typed as Intent for cast survival)
  - { method: "<android.os.Bundle: android.os.Parcelable getParcelable(java.lang.String)>", from: base, to: result, type: "android.content.Intent" }
  - { method: "<android.os.Bundle: android.os.Parcelable getParcelable(java.lang.String)>", from: base, to: result }
  - { method: "<android.os.Bundle: android.os.Parcelable getParcelable(java.lang.String)>", from: base, to: result, type: "android.net.Uri" }

