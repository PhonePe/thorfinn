sources:
  # Intent-based sources - attacker-controlled data entering via Intents
  - { kind: call, method: "<android.app.Activity: android.content.Intent getIntent()>", index: result }
  - { kind: call, method: "<android.content.Intent: java.lang.String getStringExtra(java.lang.String)>", index: result }
  - { kind: call, method: "<android.content.Intent: android.net.Uri getData()>", index: result }
  - { kind: call, method: "<android.content.Intent: android.os.Bundle getExtras()>", index: result }
  - { kind: call, method: "<android.content.Intent: java.lang.String getAction()>", index: result }
  - { kind: call, method: "<android.content.Intent: int getIntExtra(java.lang.String,int)>", index: result }
  - { kind: call, method: "<android.content.Intent: boolean getBooleanExtra(java.lang.String,boolean)>", index: result }
  - { kind: call, method: "<android.content.Intent: java.io.Serializable getSerializableExtra(java.lang.String)>", index: result }
  # type: "android.content.Intent" ensures taint survives (Intent) checkcast in pointer analysis
  - { kind: call, method: "<android.content.Intent: android.os.Parcelable getParcelableExtra(java.lang.String)>", index: result, type: "android.content.Intent" }
  # Generic/Uri parcelable extras - needed for arbitrary file write/output Uri flows
  - { kind: call, method: "<android.content.Intent: android.os.Parcelable getParcelableExtra(java.lang.String)>", index: result }
  - { kind: call, method: "<android.content.Intent: android.os.Parcelable getParcelableExtra(java.lang.String)>", index: result, type: "android.net.Uri" }
  - { kind: call, method: "<android.content.Intent: java.lang.String getDataString()>", index: result }

  # Bundle sources - data extracted from Intent extras
  # NOTE: Plain Bundle/BaseBundle string getters are intentionally NOT sources.
  # They match savedInstanceState (onCreate/onRestoreInstanceState params) and
  # Fragment/Jetpack-Compose nav arguments (NavBackStackEntry.getArguments()),
  # which are app-internal state - NOT attacker-controlled IPC entry points, and
  # were the dominant false-positive driver (Compose nav / saved-state → file sinks).
  # Genuine Intent-extra flows are still covered: Intent.getExtras() (source) ->
  # Bundle.getString (transfer, see below) -> sink. So they remain as transfers only.
  #
  # Bundle.get() typed as Intent - for Intent Redirection via Bundle.get("key") cast to Intent
  - { kind: call, method: "<android.os.Bundle: java.lang.Object get(java.lang.String)>", index: result, type: "android.content.Intent" }

  # Bundle Parcelable sources - nested Intent extraction for Intent Redirection
  # type: "android.content.Intent" so taint survives (Intent) checkcast
  - { kind: call, method: "<android.os.Bundle: android.os.Parcelable getParcelable(java.lang.String)>", index: result, type: "android.content.Intent" }
  # Generic/Uri Bundle parcelables - needed for attacker-controlled output Uri flows
  - { kind: call, method: "<android.os.Bundle: android.os.Parcelable getParcelable(java.lang.String)>", index: result }
  - { kind: call, method: "<android.os.Bundle: android.os.Parcelable getParcelable(java.lang.String)>", index: result, type: "android.net.Uri" }

  # Intent Parcelable array sources - array of nested Intents
  - { kind: call, method: "<android.content.Intent: android.os.Parcelable[] getParcelableArrayExtra(java.lang.String)>", index: result }
  - { kind: call, method: "<android.content.Intent: java.util.ArrayList getParcelableArrayListExtra(java.lang.String)>", index: result }

  # Fragment argument sources - nested Intent via Fragment.getArguments()
  - { kind: call, method: "<android.app.Fragment: android.os.Bundle getArguments()>", index: result }
  - { kind: call, method: "<androidx.fragment.app.Fragment: android.os.Bundle getArguments()>", index: result }

  # Implicit Intent creation sources
  - { kind: call, method: "<android.content.Intent: void <init>(java.lang.String)>", index: base }
  - { kind: call, method: "<android.content.Intent: void <init>(java.lang.String,android.net.Uri)>", index: base }

  # Uri path segment sources - attacker-controlled path data from Content Provider URIs
  # These methods auto-decode URL-encoded values (e.g., %2F → /), enabling path traversal
  - { kind: call, method: "<android.net.Uri: java.lang.String getLastPathSegment()>", index: result }
  - { kind: call, method: "<android.net.Uri: java.util.List getPathSegments()>", index: result }
  - { kind: call, method: "<android.net.Uri: java.lang.String getPath()>", index: result }

  # ContentProvider parameter sources - Uri parameters in ContentProvider callbacks are attacker-controlled
  # These ensure openFile/query/insert/update/delete are treated as entry points with tainted Uri
  - { kind: param, method: "<android.content.ContentProvider: android.os.ParcelFileDescriptor openFile(android.net.Uri,java.lang.String)>", index: 0 }
  - { kind: param, method: "<android.content.ContentProvider: android.os.ParcelFileDescriptor openFile(android.net.Uri,java.lang.String,android.os.CancellationSignal)>", index: 0 }
  - { kind: param, method: "<android.content.ContentProvider: android.database.Cursor query(android.net.Uri,java.lang.String[],java.lang.String,java.lang.String[],java.lang.String)>", index: 0 }
  - { kind: param, method: "<android.content.ContentProvider: android.net.Uri insert(android.net.Uri,android.content.ContentValues)>", index: 0 }
  - { kind: param, method: "<android.content.ContentProvider: int update(android.net.Uri,android.content.ContentValues,java.lang.String,java.lang.String[])>", index: 0 }
  - { kind: param, method: "<android.content.ContentProvider: int delete(android.net.Uri,java.lang.String,java.lang.String[])>", index: 0 }


  # PendingIntent Redirection sources - the returned PendingIntent object is tainted
  # If this PendingIntent wraps a mutable + implicit Intent and is exposed to an attacker,
  # the attacker can call .send() with a fillInIntent to hijack the victim's identity.
  - { kind: call, method: "<android.app.PendingIntent: android.app.PendingIntent getActivity(android.content.Context,int,android.content.Intent,int)>", index: result }
  - { kind: call, method: "<android.app.PendingIntent: android.app.PendingIntent getActivity(android.content.Context,int,android.content.Intent,int,android.os.Bundle)>", index: result }
  - { kind: call, method: "<android.app.PendingIntent: android.app.PendingIntent getBroadcast(android.content.Context,int,android.content.Intent,int)>", index: result }
  - { kind: call, method: "<android.app.PendingIntent: android.app.PendingIntent getService(android.content.Context,int,android.content.Intent,int)>", index: result }
  - { kind: call, method: "<android.app.PendingIntent: android.app.PendingIntent getForegroundService(android.content.Context,int,android.content.Intent,int)>", index: result }


