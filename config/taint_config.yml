  - { method: "<android.content.Intent: java.util.ArrayList getParcelableArrayListExtra(java.lang.String)>", from: base, to: result }

  # Fragment argument transfers
  - { method: "<android.app.Fragment: android.os.Bundle getArguments()>", from: base, to: result }
  - { method: "<androidx.fragment.app.Fragment: android.os.Bundle getArguments()>", from: base, to: result }

  # Implicit Intent propagation - tainted Intent survives method chaining (all return this)
  # Without these, taint is lost when Jimple reassigns the variable to the method return value
  # e.g., pick.setType("image/*") → Jimple: $r1 = invoke pick.setType("image/*") → pick becomes $r1
